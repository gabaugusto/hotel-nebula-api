<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hotel Nébula • Buscar hóspedes</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/main.css">
</head>

<body data-page="buscar-hospedes" class="bg-light">
    <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>
    <header class="navbar navbar-expand-lg bg-white border-bottom" role="banner">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-semibold">
                <img src="./assets/images/favicon.png" alt="Logo do Hotel Nébula" class="d-inline-block align-text-top me-2" width="32" height="32">
                Hotel Nébula
            </a>
            <nav aria-label="Navegação principal">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="./index.html" aria-current="page">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="./buscar_hospedes.html">Buscar hóspedes</a></li>
                    <li class="nav-item"><a class="nav-link" href="./cadastrar_hospedes.html">Cadastrar hóspede</a></li>
                    <li class="nav-item"><a class="nav-link" href="./reservar_quartos.html">Reservar quartos</a></li>
                    <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo" class="container py-4">
        <h1 class="h3 mb-3">Buscar hóspedes</h1>

        <section class="card shadow-sm mb-3" aria-labelledby="busca-titulo">
            <div class="card-body">
                <h2 id="busca-titulo" class="h5">Busca por ID</h2>
                <form id="form-busca-id" class="row g-3" novalidate>
                    <div class="col-md-4">
                        <label for="idHospedeBusca" class="form-label">ID do hóspede</label>
                        <input id="idHospedeBusca" type="number" min="1" class="form-control" required />
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" type="submit">Buscar por ID</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="card shadow-sm mb-3" aria-labelledby="lista-titulo">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h2 id="lista-titulo" class="h5 mb-0">Lista de hóspedes</h2>
                    <button id="btn-carregar-hospedes" class="btn btn-outline-primary btn-sm" type="button">Recarregar
                        lista</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <caption class="visually-hidden">Tabela com hóspedes cadastrados</caption>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>CPF</th>
                                <th>Ativo</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-hospedes"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <p id="status" role="status" aria-live="polite" class="text-success"></p>
    </main>

    <script src="./assets/js/app.js"></script>
</body>

</html>
