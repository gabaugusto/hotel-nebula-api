<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hotel Nebula • Cadastrar hóspede</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/main.css">
</head>

<body data-page="cadastrar-hospedes" class="bg-light">
    <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>
    <header class="navbar navbar-expand-lg bg-white border-bottom" role="banner">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-semibold">
                <img src="./assets/images/favicon.png" alt="Logo do Hotel Nebula" class="d-inline-block align-text-top me-2" width="32" height="32">
                Hotel Nebula
            </a>
            <nav aria-label="Navegação principal">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="./index.html" aria-current="page">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="./buscar_hospedes.html">Buscar hóspedes</a></li>
                    <li class="nav-item"><a class="nav-link" href="./cadastrar_hospedes.html">Cadastrar hóspede</a></li>
                    <li class="nav-item"><a class="nav-link" href="./reservar_quartos.html">Reservar quartos</a></li>
                    <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo" class="container py-4">
        <h1 class="h3 mb-3">Cadastrar ou atualizar hóspede</h1>

        <section class="card shadow-sm" aria-labelledby="cadastro-titulo">
            <div class="card-body">
                <h2 id="cadastro-titulo" class="h5">Dados do hóspede</h2>
                <form id="form-hospede" class="row g-3" novalidate>
                    <div class="col-md-3"><label for="idHospede" class="form-label">ID</label><input id="idHospede"
                            type="number" min="1" class="form-control" required /></div>
                    <div class="col-md-9"><label for="nome" class="form-label">Nome</label><input id="nome"
                            class="form-control" required /></div>
                    <div class="col-md-6"><label for="email" class="form-label">E-mail</label><input id="email"
                            type="email" class="form-control" required /></div>
                    <div class="col-md-6"><label for="cpf" class="form-label">CPF</label><input id="cpf"
                            class="form-control" required /></div>
                    <div class="col-md-6"><label for="telefone" class="form-label">Telefone</label><input id="telefone"
                            class="form-control" /></div>
                    <div class="col-md-3"><label for="dataNascimento" class="form-label">Data de
                            nascimento</label><input id="dataNascimento" type="date" class="form-control" /></div>
                    <div class="col-md-3"><label for="ativo" class="form-label">Ativo</label><select id="ativo"
                            class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select></div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-success">Criar</button>
                        <button type="button" id="btn-atualizar" class="btn btn-primary">Atualizar por ID</button>
                    </div>
                </form>
            </div>
        </section>

        <p id="status" role="status" aria-live="polite" class="mt-3 text-success"></p>
    </main>

    <script src="./assets/js/app.js"></script>
</body>

</html>
