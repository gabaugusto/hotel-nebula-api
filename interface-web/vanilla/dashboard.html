<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hotel Nebula • Dashboard</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/main.css">
</head>

<body data-page="dashboard" class="bg-light">
    <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>
    <header class="navbar navbar-expand-lg bg-white border-bottom" role="banner">
        <div class="container">
            <a href="index.html" class="navbar-brand fw-semibold">
                <img src="./assets/images/favicon.png" alt="Logo do Hotel Nebula" class="d-inline-block align-text-top me-2" width="32" height="32">
                Hotel Nebula
            </a>
            <nav aria-label="Navegação principal">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="./index.html" aria-current="page">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="./buscar_hospedes.html">Buscar hóspedes</a></li>
                    <li class="nav-item"><a class="nav-link" href="./cadastrar_hospedes.html">Cadastrar hóspede</a></li>
                    <li class="nav-item"><a class="nav-link" href="./reservar_quartos.html">Reservar quartos</a></li>
                    <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo" class="container py-4">
        <h1 class="h3 mb-3">Dashboard</h1>

        <div class="row g-3">
            <section class="col-md-6" aria-labelledby="faturamento-titulo">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 id="faturamento-titulo" class="h5">Faturamento</h2>
                        <p class="mb-1">Total de hospedagens: <strong id="totalHospedagens">-</strong></p>
                        <p class="mb-0">Faturamento total: <strong id="faturamentoTotal">-</strong></p>
                    </div>
                </div>
            </section>

            <section class="col-md-6" aria-labelledby="avaliacoes-titulo">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 id="avaliacoes-titulo" class="h5">Avaliações</h2>
                        <p class="mb-1">Total de avaliações: <strong id="totalAvaliacoes">-</strong></p>
                        <p class="mb-0">Média geral: <strong id="mediaGeral">-</strong></p>
                    </div>
                </div>
            </section>
        </div>

        <button id="btn-atualizar-dashboard" class="btn btn-primary mt-3" type="button">Atualizar dados</button>
        <p id="status" class="mt-3 text-success" role="status" aria-live="polite"></p>
    </main>

    <script src="./assets/js/app.js"></script>
</body>

</html>
