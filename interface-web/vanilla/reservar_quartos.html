<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hotel Nebula • Reservar quartos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles/main.css">
</head>

<body data-page="reservar-quartos" class="bg-light">
    <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>
    
    <header class="navbar navbar-expand-lg bg-white border-bottom" role="banner">
        <div class="container">
            <span class="navbar-brand fw-semibold">Hotel Nebula • Interface Vanilla</span>
            <nav aria-label="Navegação principal">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="./index.html" aria-current="page">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="./buscar_hospedes.html">Buscar hóspedes</a></li>
                    <li class="nav-item"><a class="nav-link" href="./cadastrar_hospedes.html">Cadastrar hóspede</a></li>
                    <li class="nav-item"><a class="nav-link" href="./reservar_quartos.html">Reservar quartos</a></li>
                    <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo" class="container py-4">
        <h1 class="h3 mb-3">Reservar quartos</h1>

        <section class="card shadow-sm mb-3" aria-labelledby="quartos-titulo">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h2 id="quartos-titulo" class="h5 mb-0">Quartos disponíveis</h2>
                    <button id="btn-carregar-quartos" class="btn btn-outline-primary btn-sm"
                        type="button">Atualizar</button>
                </div>
                <ul id="lista-quartos" class="list-group"></ul>
            </div>
        </section>

        <section class="card shadow-sm" aria-labelledby="reserva-titulo">
            <div class="card-body">
                <h2 id="reserva-titulo" class="h5">Criar reserva</h2>
                <form id="form-reserva" class="row g-3" novalidate>
                    <div class="col-md-3"><label class="form-label" for="idReserva">ID reserva</label><input
                            id="idReserva" type="number" class="form-control" required /></div>
                    <div class="col-md-3"><label class="form-label" for="idHospedeReserva">ID hóspede</label><input
                            id="idHospedeReserva" type="number" class="form-control" required /></div>
                    <div class="col-md-3"><label class="form-label" for="idQuartoReserva">ID quarto</label><input
                            id="idQuartoReserva" type="number" class="form-control" required /></div>
                    <div class="col-md-3"><label class="form-label" for="canal">Canal</label><input id="canal"
                            class="form-control" value="site_proprio" required /></div>
                    <div class="col-md-3"><label class="form-label" for="dataCheckin">Check-in</label><input
                            id="dataCheckin" type="date" class="form-control" required /></div>
                    <div class="col-md-3"><label class="form-label" for="dataCheckout">Check-out</label><input
                            id="dataCheckout" type="date" class="form-control" required /></div>
                    <div class="col-md-3"><label class="form-label" for="statusReserva">Status</label><input
                            id="statusReserva" class="form-control" value="confirmada" required /></div>
                    <div class="col-md-3"><label class="form-label" for="valorPrevisto">Valor previsto</label><input
                            id="valorPrevisto" type="number" step="0.01" class="form-control" required /></div>

                    <div class="col-12">
                        <button class="btn btn-success" type="submit">Salvar reserva</button>
                    </div>
                </form>
            </div>
        </section>

        <p id="status" role="status" aria-live="polite" class="mt-3 text-success"></p>
    </main>

    <script src="./assets/js/app.js"></script>
</body>

</html>
